version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: rent_finder_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rent_finder
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: rent_finder_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: rent_finder_api
    restart: always
    depends_on:
      - db
      - redis
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/rent_finder?schema=public
      - REDIS_URL=redis://redis:6379
      - PORT=5000
      - NODE_ENV=production
      - CLIENT_URL=http://localhost:3000
      - JWT_SECRET=super_secret_jwt_key
      - JWT_REFRESH_SECRET=super_secret_refresh_key

  client:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rent_finder_client
    restart: always
    depends_on:
      - api
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
      - NEXT_PUBLIC_SOCKET_URL=http://localhost:5000

volumes:
  postgres_data:
  redis_data:
